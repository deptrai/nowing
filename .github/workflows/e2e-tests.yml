# E2E Test Pipeline — Playwright (Chromium)
# Generated by BMad TEA Agent - CI/CD Module
# Stack: fullstack | Framework: playwright | Package manager: pnpm | Node: 22 LTS
#
# Backend + frontend are started manually as background processes.
# Postgres runs as a service container (infrastructure only).

name: E2E Tests

on:
  push:
    branches: [main, dev]
    paths:
      - "nowing_web/**"
      - "nowing_backend/**"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "nowing_web/**"
      - "nowing_backend/**"
      - ".github/workflows/e2e-tests.yml"
  schedule:
    # Weekly burn-in — Sundays at 03:00 UTC
    - cron: "0 3 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "latest"
  PYTHON_VERSION: "3.12"

# ─────────────────────────────────────────────────────────────────────────────
# INSTALL & CACHE
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  install:
    name: Install & Cache
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: nowing_web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: nowing_web
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('nowing_web/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: nowing_web
        run: pnpm exec playwright install --with-deps chromium

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            nowing_backend/.venv
          key: python-deps-${{ hashFiles('nowing_backend/uv.lock') }}
          restore-keys: python-deps-

      - name: Install backend dependencies
        working-directory: nowing_backend
        run: uv sync

  # ─────────────────────────────────────────────────────────────────────────────
  # BURN-IN — changed spec files (flaky detection, PR only)
  # ─────────────────────────────────────────────────────────────────────────────
  burn-in:
    name: Burn-In Changed Specs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: install
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nowing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nowing_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: nowing_web/pnpm-lock.yaml

      - name: Restore frontend dependencies
        working-directory: nowing_web
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('nowing_web/pnpm-lock.yaml') }}

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Restore backend dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            nowing_backend/.venv
          key: python-deps-${{ hashFiles('nowing_backend/uv.lock') }}
          restore-keys: python-deps-

      - name: Restore backend deps (sync)
        working-directory: nowing_backend
        run: uv sync

      - name: Start backend
        working-directory: nowing_backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nowing_test
          SECRET_KEY: ci-e2e-secret-not-for-production
        run: |
          nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          echo "Waiting for backend..."
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && echo "✅ Backend ready" && break
            sleep 2
          done

      - name: Build & start frontend
        working-directory: nowing_web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          pnpm build
          nohup pnpm start -p 4998 > /tmp/frontend.log 2>&1 &
          echo "Waiting for frontend..."
          for i in {1..30}; do
            curl -sf http://localhost:4998 && echo "✅ Frontend ready" && break
            sleep 2
          done

      - name: Detect changed E2E specs
        id: changed-specs
        run: |
          BASE="${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${BASE}...HEAD" | grep -E 'playwright/e2e/.*\.spec\.(ts|js)$' || true)
          echo "changed_specs=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Changed E2E specs: ${CHANGED:-none}"

      - name: Run burn-in on changed specs (5 iterations)
        if: steps.changed-specs.outputs.changed_specs != ''
        working-directory: nowing_web
        env:
          BASE_URL: http://localhost:4998
          API_URL: http://localhost:8000
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CI: "true"
        run: |
          SPECS="${{ steps.changed-specs.outputs.changed_specs }}"
          echo "🔥 Starting burn-in — 5 iterations on changed specs"
          for i in {1..5}; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Burn-in iteration $i/5"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            # Security: SPECS is derived from git diff output, not user input
            # shellcheck disable=SC2086
            pnpm exec playwright test $SPECS --reporter=line || {
              echo "❌ Burn-in failed on iteration $i"
              exit 1
            }
          done
          echo "✅ Burn-in complete — no flakiness detected"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Backend log ===" && cat /tmp/backend.log || true
          echo "=== Frontend log ===" && cat /tmp/frontend.log || true

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            nowing_web/playwright/test-results/
            nowing_web/playwright/reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E — sharded (2 shards, fail-fast disabled)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: install
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nowing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nowing_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: nowing_web/pnpm-lock.yaml

      - name: Restore frontend dependencies
        working-directory: nowing_web
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('nowing_web/pnpm-lock.yaml') }}

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Restore backend dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            nowing_backend/.venv
          key: python-deps-${{ hashFiles('nowing_backend/uv.lock') }}
          restore-keys: python-deps-

      - name: Restore backend deps (sync)
        working-directory: nowing_backend
        run: uv sync

      - name: Start backend
        working-directory: nowing_backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nowing_test
          SECRET_KEY: ci-e2e-secret-not-for-production
        run: |
          nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          echo "Waiting for backend..."
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && echo "✅ Backend ready" && break
            sleep 2
          done

      - name: Build & start frontend
        working-directory: nowing_web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          pnpm build
          nohup pnpm start -p 4998 > /tmp/frontend.log 2>&1 &
          echo "Waiting for frontend..."
          for i in {1..30}; do
            curl -sf http://localhost:4998 && echo "✅ Frontend ready" && break
            sleep 2
          done

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        working-directory: nowing_web
        env:
          BASE_URL: http://localhost:4998
          API_URL: http://localhost:8000
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CI: "true"
        run: |
          pnpm exec playwright test \
            --shard=${{ matrix.shard }}/2 \
            --reporter=html,junit

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Backend log ===" && cat /tmp/backend.log || true
          echo "=== Frontend log ===" && cat /tmp/frontend.log || true

      - name: Upload test results (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: |
            nowing_web/playwright/test-results/
            nowing_web/playwright/reports/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # REPORT — aggregate all shards
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: E2E Report
    runs-on: ubuntu-latest
    needs: [e2e, burn-in]
    if: always()

    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-results-shard-*
          merge-multiple: true
          path: e2e-results/

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then exit 0; fi
          # Security: all GitHub context passed through env: to prevent script injection
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ E2E tests failed on \`${REF_NAME}\`\n🔗 ${GITHUB_RUN_URL}\",\"parse_mode\":\"Markdown\"}"

      - name: Generate step summary
        run: |
          echo "## 🎭 E2E Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E (shards) | ${{ needs.e2e.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Burn-In | ${{ needs.burn-in.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.e2e.result }}" == "failure" ]; then
            echo "❌ **E2E tests failed** — check shard artifacts for traces/screenshots" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **All E2E tests passed**" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "⚠️ **Flaky tests detected** — review burn-in artifacts before merging" >> "$GITHUB_STEP_SUMMARY"
          fi

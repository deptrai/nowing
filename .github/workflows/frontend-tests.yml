# Frontend Test Pipeline — Vitest (jsdom)
# Generated by BMad TEA Agent - CI/CD Module
# Stack: frontend | Framework: vitest | Package manager: pnpm | Node: 22 LTS
#
# Triggers on changes to nowing_web/** for PRs/pushes to main or dev.
# Weekly burn-in (schedule) runs regardless of changed paths.

name: Frontend Tests

on:
  push:
    branches: [main, dev]
    paths:
      - "nowing_web/**"
      - "scripts/generate_plan_ids.py"
      - "nowing_backend/app/schemas/stripe.py"
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "nowing_web/**"
      - "scripts/generate_plan_ids.py"
      - "nowing_backend/app/schemas/stripe.py"
      - ".github/workflows/frontend-tests.yml"
  schedule:
    # Weekly burn-in — Sundays at 02:00 UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# LINT
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: nowing_web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: nowing_web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify plan-ids drift (Story 11.6 / ADR-012)
        # Fails CI if nowing_web/lib/generated/plan-ids.ts is out of sync
        # with the canonical BE PlanId enum. Single source of truth for Pro
        # plan SKUs — stops silent FE/BE drift.
        run: pnpm verify:plan-ids

      - name: Run Next.js linter
        run: pnpm exec next lint

  # ─────────────────────────────────────────────────────────────────────────────
  # TEST
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    defaults:
      run:
        working-directory: nowing_web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: nowing_web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: nowing_web/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # BURN-IN — flaky test detection
  # ─────────────────────────────────────────────────────────────────────────────
  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test
    # Run on PRs to main/dev or on the weekly schedule
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: nowing_web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: nowing_web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run burn-in loop (10 iterations)
        run: |
          echo "🔥 Starting burn-in — detecting flaky tests"
          for i in {1..10}; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Iteration $i/10"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            pnpm exec vitest run || exit 1
          done
          echo "✅ Burn-in complete — no flaky tests detected"

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: nowing_web/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # REPORT
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test, burn-in]
    if: always()

    steps:
      - name: Generate step summary
        run: |
          echo "## 🧪 Frontend Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test  | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Burn-in | ${{ needs.burn-in.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "⚠️ **Flaky tests detected** — review burn-in artifacts" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ **295 tests passing** — coverage report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
          fi

name: Backend Tests

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if backend files changed
        id: backend-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'nowing_backend/**'

      - name: Set up Python
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install UV
        if: steps.backend-changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Cache dependencies
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            nowing_backend/.venv
          key: python-deps-${{ hashFiles('nowing_backend/uv.lock') }}
          restore-keys: |
            python-deps-

      - name: Cache HuggingFace models
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ env.EMBEDDING_MODEL }}

      - name: Install dependencies
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        run: uv sync

      - name: Run unit tests
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        run: uv run pytest -m unit -n auto

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nowing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nowing_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if backend files changed
        id: backend-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'nowing_backend/**'

      - name: Set up Python
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install UV
        if: steps.backend-changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Cache dependencies
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            nowing_backend/.venv
          key: python-deps-${{ hashFiles('nowing_backend/uv.lock') }}
          restore-keys: |
            python-deps-

      - name: Cache HuggingFace models
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ env.EMBEDDING_MODEL }}

      - name: Install dependencies
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        run: uv sync

      - name: Run integration tests
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nowing_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          ETL_SERVICE: DOCLING
        run: uv run pytest -m integration

  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nowing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nowing_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if backend files changed
        id: backend-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'nowing_backend/**'

      - name: Set up Python
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install UV
        if: steps.backend-changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Cache dependencies
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            nowing_backend/.venv
          key: python-deps-${{ hashFiles('nowing_backend/uv.lock') }}
          restore-keys: |
            python-deps-

      - name: Cache HuggingFace models
        if: steps.backend-changes.outputs.backend == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ env.EMBEDDING_MODEL }}

      - name: Install dependencies
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        run: uv sync

      - name: Run database migrations
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nowing_test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: uv run alembic upgrade head

      - name: Seed test user
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nowing_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          uv run python - <<'PYEOF'
          import asyncio, os, uuid
          from fastapi_users.password import PasswordHelper
          from sqlalchemy.ext.asyncio import create_async_engine, async_sessionmaker
          from sqlalchemy import text

          DATABASE_URL = os.environ["DATABASE_URL"]
          email = os.environ.get("TEST_USER_EMAIL", "test@nowing.test")
          password = os.environ.get("TEST_USER_PASSWORD", "test-password")

          async def seed():
              helper = PasswordHelper()
              hashed = helper.hash(password)
              engine = create_async_engine(DATABASE_URL)
              Session = async_sessionmaker(engine, expire_on_commit=False)
              async with Session() as session:
                  await session.execute(
                      text("""
                          INSERT INTO "user" (id, email, hashed_password, is_active, is_verified, is_superuser)
                          VALUES (:id, :email, :pw, true, true, false)
                          ON CONFLICT (email) DO UPDATE SET hashed_password = :pw
                      """),
                      {"id": str(uuid.uuid4()), "email": email, "pw": hashed},
                  )
                  await session.commit()
              await engine.dispose()
              print(f"Test user seeded: {email}")

          asyncio.run(seed())
          PYEOF

      - name: Run API tests
        if: steps.backend-changes.outputs.backend == 'true'
        working-directory: nowing_backend
        env:
          TEST_ENV: "true"
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nowing_test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: uv run pytest -m api -v --tb=short --no-header -p no:warnings

  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests]
    if: always()

    steps:
      - name: Check all test jobs
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          API_RESULT: ${{ needs.api-tests.result }}
        run: |
          if [[ "$UNIT_RESULT" == "failure" ||
                "$INTEGRATION_RESULT" == "failure" ||
                "$API_RESULT" == "failure" ]]; then
            echo "Backend tests failed"
            exit 1
          else
            echo "All backend tests passed"
          fi
